<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Login | Plantify</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-[#005746] flex items-center justify-center px-6">

  <div class="w-full max-w-md bg-white/15 backdrop-blur-xl border border-white/20 shadow-2xl p-8 md:p-10 text-white">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold">Plantify</h1>
      <p class="text-xs italic text-white/70 mt-1">Garden</p>

      <h2 class="text-2xl font-light mt-8">Admin Login</h2>
      <p class="text-sm text-white/70 mt-2">Access your admin dashboard</p>
    </div>

    <form class="space-y-5">

      <div>
        <label class="block text-sm mb-2">Email Address</label>
        <input
          type="email"
          placeholder="admin@example.com"
          class="w-full h-12 px-4 bg-white/90 text-[#005746] outline-none placeholder:text-gray-400"
        />
      </div>

      <div>
        <label class="block text-sm mb-2">Password</label>
        <input
          type="password"
          placeholder="Enter password"
          class="w-full h-12 px-4 bg-white/90 text-[#005746] outline-none placeholder:text-gray-400"
        />
      </div>

      <div class="flex items-center justify-between text-sm text-white/80">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="accent-[#005746]" />
          Remember me
        </label>

        <a href="admin-forgot-password.html"
   class="hover:underline">
  Forgot?
</a>
      </div>

      <button
        type="submit"
        class="w-full h-12 bg-white text-[#005746] font-medium hover:bg-[#eefaf7] duration-300">
        Login as Admin
      </button>
      <p class="text-center text-sm text-white/70 mt-6">

  Don’t have an account?

  <a href="admin-signup.html"
     class="underline text-white">

    Create account
  </a>
</p>

    </form>

    <p class="text-center text-sm text-white/70 mt-6">
      Back to
      <a href="index.html" class="text-white underline">Home</a>
    </p>

  </div>

</body>
</html>
